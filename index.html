// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt=v=>{
  if(v==null)return'—';
  const neg=v<0,av=Math.abs(v);
  const s='$'+(av>=1e6?(av/1e6).toFixed(2)+'M':Math.round(av).toLocaleString());
  return neg?'('+s+')':s;
};
function dateToMonth(d){return MONTHS[parseInt(d.split('-')[1])-1];}
function filterWeeks(broker){
  let w=[...broker.weeks];
  if(state.month!=='All') w=w.filter(x=>x.month===state.month);
  if(state.week!=='All')  w=w.filter(x=>x.date===state.week);
  return w;
}
function brokerTotal(broker,key){
  if(state.month==='All'&&state.week==='All'){
    if(key==='inv'     &&broker.inv_ytd!=null)     return broker.inv_ytd;
    if(key==='trails'  &&broker.trails_ytd!=null)  return broker.trails_ytd;
    if(key==='w_indem' &&broker.w_indem_ytd!=null) return broker.w_indem_ytd;
    if(key==='w_non'   &&broker.w_non_ytd!=null)   return broker.w_non_ytd;
  }
  return filterWeeks(broker).reduce((s,w)=>s+(w[key]||0),0);
}
function filteredBrokers(){
  let rows=[...RAW];
  rows=rows.filter(r=>!SKIP_NAMES.has(r.name.trim())&&r.team!=='GIM (via IA)');
  if(GROUPED&&state.team!=='All') rows=rows.filter(r=>r.team===state.team);
  if(state.broker!=='All') rows=rows.filter(r=>r.name===state.broker);
  return rows;
}


// ── Roster merge: ensure every canonical team member is present ────────────────
// data.json (rebuilt every 4h) can omit members that currently have no figures.
// This union keeps live data authoritative while guaranteeing no member disappears.
function mergeRoster(live){
  if(SHEET!=='ia'||typeof CANON_IA==='undefined') return live.slice();
  const byName=new Map();
  live.forEach(r=>byName.set(r.name.trim(),r));
  const out=live.slice();
  CANON_IA.forEach(c=>{
    if(!byName.has(c.name.trim())){
      out.push({name:c.name,team:c.team,inv_ytd:0,trails_ytd:0,w_indem_ytd:0,w_non_ytd:0,weeks:[]});
    }
  });
  return out;
}

// ── Live data fetch ──────────────────────────────────────────────────────────
async function loadData(){
  const btn=document.getElementById('refreshBtn');
  if(btn){btn.classList.add('spinning');btn.querySelector('.rb-lbl').textContent='Refreshing…';}
  try{
    const resp=await fetch('./data.json?t='+Date.now());
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const json=await resp.json();
    if(json[SHEET]&&json[SHEET].length) RAW=mergeRoster(json[SHEET]);
    const updated=new Date(json.updated);
    document.getElementById('lastUpdated').textContent=
      'Updated '+updated.toLocaleString([],{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+
      ' · Auto-syncs every 4h';
    document.querySelectorAll('.warn-banner').forEach(e=>e.remove());
  }catch(e){
    document.getElementById('lastUpdated').textContent='⚠ Cached data';
    document.querySelectorAll('.warn-banner').forEach(e=>e.remove());
    const warn=document.createElement('div');
    warn.className='warn-banner';
    warn.innerHTML=`<span>⚠ Live update unavailable. <small>${e.message}</small></span>
      <button onclick="loadData()" style="padding:4px 12px;background:#b87214;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit">&#8635; Retry</button>`;
    document.getElementById('app').insertBefore(warn,document.getElementById('app').firstChild);
  }
  if(btn){btn.classList.remove('spinning');btn.querySelector('.rb-lbl').textContent='Refresh';}
  rebuildFilters();render();sendHeight();
}

// ── Filters ──────────────────────────────────────────────────────────────────
function rebuildFilters(){
  const allDates=[...new Set(RAW.flatMap(b=>b.weeks.map(w=>w.date)))].sort();
  const availMonths=[...new Set(allDates.map(dateToMonth))];

  const mSel=document.getElementById('monthSel');
  mSel.innerHTML='<option value="All">All Months (YTD)</option>'+
    availMonths.map(m=>`<option value="${m}"${m===state.month?' selected':''}>${m}</option>`).join('');
  mSel.onchange=()=>{state.month=mSel.value;state.week='All';rebuildFilters();render();};

  const wkDates=state.month==='All'?allDates:allDates.filter(d=>dateToMonth(d)===state.month);
  const wSel=document.getElementById('weekSel');
  wSel.innerHTML='<option value="All">All Weeks</option>'+
    wkDates.map((d,i)=>`<option value="${d}"${d===state.week?' selected':''}>Week ${i+1}</option>`).join('');
  wSel.onchange=()=>{state.week=wSel.value;render();};

  
  const teams=['All',...new Set(RAW.map(r=>r.team))].sort();
  const tSel=document.getElementById('teamSel');
  tSel.innerHTML=teams.map(t=>`<option value="${t}"${t===state.team?' selected':''}>${t==='All'?'All Teams':t}</option>`).join('');
  tSel.onchange=()=>{state.team=tSel.value;state.broker='All';rebuildFilters();render();};
  const bRows=state.team==='All'?RAW:RAW.filter(r=>r.team===state.team);
  const bSel=document.getElementById('brokerSel');
  bSel.innerHTML='<option value="All">All Brokers</option>'+
    [...new Set(bRows.map(r=>r.name))].sort().map(n=>`<option value="${n}"${n===state.broker?' selected':''}>${n}</option>`).join('');
  bSel.onchange=()=>{state.broker=bSel.value;render();};

  const vEl=document.getElementById('viewTabs');vEl.innerHTML='';
  VIEW_DEFS.forEach(v=>{
    const b=document.createElement('button');
    b.className='view-tab'+(state.view===v.id?' active':'');
    b.textContent=v.lbl;b.dataset.vid=v.id;
    b.onclick=()=>{state.view=v.id;render();};vEl.appendChild(b);
  });
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(){
  document.querySelectorAll('.view-tab').forEach(b=>b.classList.toggle('active',b.dataset.vid===state.view));
  const rows=filteredBrokers();
  const totS=rows.reduce((s,r)=>s+brokerTotal(r,'sales'),0);
  const totI=rows.reduce((s,r)=>s+brokerTotal(r,'inv'),0);
  const totR=rows.reduce((s,r)=>s+brokerTotal(r,REV_KEY),0);
  const periodLbl=state.week!=='All'?state.week:(state.month!=='All'?state.month+' total':'Year to date');
  const k1=document.getElementById('k1'),k2=document.getElementById('k2'),k3=document.getElementById('k3');
  const k1s=document.getElementById('k1s'),k2s=document.getElementById('k2s'),k3s=document.getElementById('k3s');
  if(k1){k1.textContent=fmt(totS);k1s.textContent=periodLbl;}
  if(k2){k2.textContent=fmt(totI);k2s.textContent=INV_LABEL;}
  if(k3){k3.textContent=fmt(totR);k3s.textContent=REV_LABEL;}
  // Extra IA KPI cards
  const ktr=document.getElementById('k_trails');
  if(ktr){
    const totTrails=rows.reduce((s,r)=>s+brokerTotal(r,'trails'),0);
    const totWI=rows.reduce((s,r)=>s+brokerTotal(r,'w_indem'),0);
    const totWN=rows.reduce((s,r)=>s+brokerTotal(r,'w_non'),0);
    ktr.textContent=fmt(totTrails);document.getElementById('k_trails_s').textContent=periodLbl;
    document.getElementById('k_wi').textContent=fmt(totWI);document.getElementById('k_wi_s').textContent=periodLbl;
    document.getElementById('k_wn').textContent=fmt(totWN);document.getElementById('k_wn_s').textContent=periodLbl;
  }
  if(chartInst){chartInst.destroy();chartInst=null;}
  const panel=document.getElementById('panel');
  const key=state.view==='rev'?REV_KEY:state.view==='inv'?'inv':'sales';
  if(state.view==='trend')renderTrend(rows,panel);
  else if(state.view==='table')renderTable(rows,panel);
  else if(state.view==='sales')renderWritten(rows,panel);
  else renderBars(rows,key,panel);
  sendHeight();
}

// ── Bar chart ─────────────────────────────────────────────────────────────────
function barRow(name,v,maxV,color){
  const neg=v<0,pct=(Math.abs(v)/maxV*100).toFixed(1);
  return `<div class="bar-row">
    <span class="bar-name">${name}</span>
    <div class="bar-track"><div class="bar-fill" style="background:${neg?'#c03030':color};width:${pct}%"></div></div>
    <span class="bar-val" style="color:${neg?'#c03030':color}">${fmt(v)}</span>
  </div>`;
}

function renderBars(rows,key,panel){
  const color=key==='inv'?ACCENT:key===REV_KEY?REV_COLOR:'#0d1b3e';
  const label=key==='inv'?INV_LABEL:key===REV_KEY?REV_LABEL:'Sales (Written)';
  let html=`<div class="legend"><span><span class="leg-dot" style="background:${color}"></span>${label}</span></div>`;
  if(GROUPED){
    const byTeam={};rows.forEach(r=>{if(!byTeam[r.team])byTeam[r.team]=[];byTeam[r.team].push(r);});
    const maxV=Math.max(...rows.map(r=>Math.abs(brokerTotal(r,key))),1);
    TEAM_ORDER.filter(t=>byTeam[t]).forEach(t=>{
      const tTotal=byTeam[t].reduce((s,r)=>s+brokerTotal(r,key),0);
      html+=`<div class="group-hdr"><span>${t}</span><span>${fmt(tTotal)}</span></div>`;
      html+=byTeam[t].sort((a,b)=>brokerTotal(b,key)-brokerTotal(a,key)).map(r=>barRow(r.name,brokerTotal(r,key),maxV,color)).join('');
    });
  }else if(rows.length&&rows[0].group){
    const byGroup={};rows.forEach(r=>{const g=r.group||'Other';if(!byGroup[g])byGroup[g]=[];byGroup[g].push(r);});
    const maxV=Math.max(...rows.map(r=>Math.abs(brokerTotal(r,key))),1);
    ['General & Medical','Topsurance','Other'].filter(g=>byGroup[g]).forEach(g=>{
      if(gimCollapsed[g]===undefined)gimCollapsed[g]=false;
      const gTotal=byGroup[g].reduce((s,r)=>s+brokerTotal(r,key),0);
      const icon=gimCollapsed[g]?'&#9654;':'&#9660;';
      html+=`<div class="group-hdr" style="cursor:pointer" onclick="gimCollapsed['${g}']=!gimCollapsed['${g}'];render()"><span>${icon} ${g}</span><span>${fmt(gTotal)}</span></div>`;
      if(!gimCollapsed[g]){
        html+=byGroup[g].sort((a,b)=>brokerTotal(b,key)-brokerTotal(a,key)).map(r=>barRow(r.name,brokerTotal(r,key),maxV,color)).join('');
      }
    });
  }else{
    const sorted=[...rows].map(r=>[r.name,brokerTotal(r,key)]).sort((a,b)=>b[1]-a[1]);
    const maxV=Math.max(...sorted.map(x=>Math.abs(x[1])),1);
    html+=sorted.map(([n,v])=>barRow(n,v,maxV,color)).join('');
  }
  panel.innerHTML=html||'<div class="no-data">No data for selected filters</div>';
}

// ── Written (single total bar + expandable Indem / Non-Indem breakdown) ────────
let writtenExpanded = {};  // tracks which broker rows are expanded

function writtenBarRow(name, wi, wn, maxV, uid) {
  const WI_COLOR = '#0d1b3e';
  const WN_COLOR = '#6b21a8';
  const total = wi + wn;
  const neg = total < 0;
  const pct = (Math.abs(total) / maxV * 100).toFixed(1);
  const expanded = writtenExpanded[uid];
  const icon = expanded ? '&#9650;' : '&#9660;';
  let html = `<div class="bar-row" style="flex-direction:column;align-items:stretch;padding:0;margin-bottom:2px">
    <div style="display:flex;align-items:center;gap:10px;padding:3px 4px;border-radius:6px;cursor:pointer" onclick="writtenExpanded['${uid}']=!writtenExpanded['${uid}'];render()">
      <span class="bar-name">${name}</span>
      <div class="bar-track" style="flex:1"><div class="bar-fill" style="background:${neg?'#c03030':'#3b5bdb'};width:${pct}%"></div></div>
      <span style="font-size:12px;font-weight:700;width:90px;text-align:right;flex-shrink:0;color:${neg?'#c03030':'#3b5bdb'}">${fmt(total)}</span>
      <span style="font-size:10px;color:#8a91b0;flex-shrink:0;width:14px;text-align:center">${icon}</span>
    </div>`;
  if (expanded) {
    const negI = wi < 0, negN = wn < 0;
    const pctI = (Math.abs(wi) / maxV * 100).toFixed(1);
    const pctN = (Math.abs(wn) / maxV * 100).toFixed(1);
    html += `<div style="padding:2px 4px 4px 14px;display:flex;flex-direction:column;gap:3px">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="width:186px;font-size:10px;color:#6b7290;text-align:right;flex-shrink:0">Indemnified</span>
        <div class="bar-track" style="flex:1;height:16px"><div class="bar-fill" style="background:${negI?'#c03030':WI_COLOR};width:${pctI}%"></div></div>
        <span style="font-size:11px;font-weight:700;width:90px;text-align:right;flex-shrink:0;color:${negI?'#c03030':WI_COLOR}">${fmt(wi)}</span>
        <span style="width:14px"></span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="width:186px;font-size:10px;color:#6b7290;text-align:right;flex-shrink:0">Non-Indemnified</span>
        <div class="bar-track" style="flex:1;height:16px"><div class="bar-fill" style="background:${negN?'#c03030':WN_COLOR};width:${pctN}%"></div></div>
        <span style="font-size:11px;font-weight:700;width:90px;text-align:right;flex-shrink:0;color:${negN?'#c03030':WN_COLOR}">${fmt(wn)}</span>
        <span style="width:14px"></span>
      </div>
    </div>`;
  }
  html += `</div>`;
  return html;
}

function renderWritten(rows, panel) {
  const maxV = Math.max(...rows.map(r => Math.abs(brokerTotal(r,'w_indem') + brokerTotal(r,'w_non'))), 1);
  let html = `<div class="legend">
    <span><span class="leg-dot" style="background:#3b5bdb"></span>Written Total &nbsp;<span style="color:#aaa;font-size:10px">&#9660; click a row to see split</span></span>
  </div>`;
  if (GROUPED) {
    const byTeam = {};
    rows.forEach(r => { if (!byTeam[r.team]) byTeam[r.team] = []; byTeam[r.team].push(r); });
    TEAM_ORDER.filter(t => byTeam[t]).forEach(t => {
      const tTotal = byTeam[t].reduce((s,r) => s + brokerTotal(r,'w_indem') + brokerTotal(r,'w_non'), 0);
      if (writtenCollapsed[t] === undefined) writtenCollapsed[t] = false;
      const icon = writtenCollapsed[t] ? '&#9654;' : '&#9660;';
      html += `<div class="group-hdr" style="cursor:pointer" onclick="writtenCollapsed['${t}']=!writtenCollapsed['${t}'];render()">
        <span>${icon} ${t}</span><span>${fmt(tTotal)}</span>
      </div>`;
      if (!writtenCollapsed[t]) {
        const sorted = [...byTeam[t]].sort((a,b) =>
          (brokerTotal(b,'w_indem')+brokerTotal(b,'w_non')) - (brokerTotal(a,'w_indem')+brokerTotal(a,'w_non')));
        html += sorted.map(r => writtenBarRow(r.name, brokerTotal(r,'w_indem'), brokerTotal(r,'w_non'), maxV, t+'__'+r.name)).join('');
      }
    });
  } else {
    const sorted = [...rows].sort((a,b) =>
      (brokerTotal(b,'w_indem')+brokerTotal(b,'w_non')) - (brokerTotal(a,'w_indem')+brokerTotal(a,'w_non')));
    html += sorted.map(r => writtenBarRow(r.name, brokerTotal(r,'w_indem'), brokerTotal(r,'w_non'), maxV, r.name)).join('');
  }
  panel.innerHTML = html || '<div class="no-data">No data for selected filters</div>';
}

// ── Trend ─────────────────────────────────────────────────────────────────────
function renderTrend(rows,panel){
  const allDates=[...new Set(rows.flatMap(r=>r.weeks.map(w=>w.date)))].sort();
  if(!allDates.length){panel.innerHTML='<div class="no-data">No data</div>';return;}
  const byMonth={};
  allDates.forEach(d=>{
    const m=dateToMonth(d);
    if(!byMonth[m])byMonth[m]={sales:0,inv:0,rev:0};
    rows.forEach(r=>{
      const w=r.weeks.find(x=>x.date===d);if(!w)return;
      byMonth[m].sales+=(w.sales||0);byMonth[m].inv+=(w.inv||0);byMonth[m].rev+=(w[REV_KEY]||0);
    });
  });
  const months=MONTHS.filter(m=>byMonth[m]);
  panel.innerHTML=`<div class="legend">
    <span><span class="leg-dot" style="background:#0d1b3e"></span>Sales</span>
    <span><span class="leg-dot" style="background:${ACCENT}"></span>Issued</span>
    <span><span class="leg-dot" style="background:${REV_COLOR}"></span>Trails</span>
  </div><div class="chart-wrap"><canvas id="trendChart"></canvas></div>`;
  setTimeout(()=>{
    const ctx=document.getElementById('trendChart');if(!ctx)return;
    chartInst=new Chart(ctx,{type:'bar',data:{labels:months,datasets:[
      {label:'Sales',data:months.map(m=>byMonth[m].sales),backgroundColor:'#0d1b3e',borderRadius:3,categoryPercentage:.7,barPercentage:.3},
      {label:'Issued',data:months.map(m=>byMonth[m].inv),backgroundColor:ACCENT,borderRadius:3,categoryPercentage:.7,barPercentage:.3},
      {label:'Trails',data:months.map(m=>byMonth[m].rev),backgroundColor:REV_COLOR,borderRadius:3,categoryPercentage:.7,barPercentage:.3}
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.parsed.y)}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:11},color:'#6b7290'}},
               y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:10},color:'#6b7290',callback:v=>fmt(v)}}}}});
    sendHeight();setTimeout(sendHeight,300);
  },50);
}

// ── Table ─────────────────────────────────────────────────────────────────────
function renderTable(rows,panel){
  const getSortVal=r=>{
    if(tblSort.col==='name')return r.name;
    if(tblSort.col==='w_indem')return brokerTotal(r,'w_indem');
    if(tblSort.col==='w_non')return brokerTotal(r,'w_non');
    return brokerTotal(r,tblSort.col==='rev'?REV_KEY:tblSort.col==='inv'?'inv':'sales');
  };
  const sorted=[...rows].sort((a,b)=>{
    const av=getSortVal(a),bv=getSortVal(b);
    if(typeof av==='string')return tblSort.dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
    return tblSort.dir==='asc'?av-bv:bv-av;
  });
  function thS(label,col){
    const active=tblSort.col===col,arr=active?(tblSort.dir==='asc'?'↑':'↓'):'↕',clr=active?ACCENT:'#b0b4cc';
    return `<th onclick="tblSort={col:'${col}',dir:(tblSort.col==='${col}'&&tblSort.dir==='desc')?'asc':'desc'};render()">${label} <span style="color:${clr};font-size:10px">${arr}</span></th>`;
  }
  const teamCol=GROUPED?'<th>Team</th>':'';
  const tRows=sorted.map(r=>{
    const wi=brokerTotal(r,'w_indem'),wn=brokerTotal(r,'w_non'),inv=brokerTotal(r,'inv'),rev=brokerTotal(r,REV_KEY),wks=filterWeeks(r).length;
    const tc=GROUPED?`<td><span class="badge">${r.team}</span></td>`:'';
    return `<tr>${tc}<td style="font-weight:600">${r.name}</td>
      <td class="num" style="color:#0d1b3e">${fmt(wi)}</td>
      <td class="num" style="color:#6b21a8">${fmt(wn)}</td>
      <td class="num" style="color:${ACCENT}">${fmt(inv)}</td>
      <td class="num" style="color:${REV_COLOR}">${fmt(rev)}</td>
      <td class="num" style="color:#8a91b0">${wks}</td></tr>`;
  }).join('');
  const totWI=rows.reduce((s,r)=>s+brokerTotal(r,'w_indem'),0);
  const totWN=rows.reduce((s,r)=>s+brokerTotal(r,'w_non'),0);
  const totI=rows.reduce((s,r)=>s+brokerTotal(r,'inv'),0);
  const totR=rows.reduce((s,r)=>s+brokerTotal(r,REV_KEY),0);
  const tc2=GROUPED?'<td></td>':'';
  panel.innerHTML=`<div style="overflow-x:auto"><table>
    <thead><tr>${teamCol}${thS('Broker','name')}${thS('Written Indem.','w_indem')}${thS('Written Non-Indem.','w_non')}${thS('Issued','inv')}${thS('Trails','rev')}<th class="num">Wks</th></tr></thead>
    <tbody>${tRows}</tbody>
    <tfoot><tr>${tc2}<td>Total (${rows.length})</td><td class="num">${fmt(totWI)}</td><td class="num">${fmt(totWN)}</td><td class="num">${fmt(totI)}</td><td class="num">${fmt(totR)}</td><td></td></tr></tfoot>
  </table></div>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
const VIEW_DEFS=[{id:'inv',lbl:'Issued'},{id:'rev',lbl:'Trails'},{id:'sales',lbl:'Written'},{id:'trend',lbl:'Trend'},{id:'table',lbl:'Table'}];
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('lastUpdated').textContent='⚠ Cached data';
  rebuildFilters();render();
  loadData();
  setInterval(loadData,4*60*60*1000);
});
</script>
